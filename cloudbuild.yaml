steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - volunteer-matcher
      - --source
      - .
      - --region
      - asia-south1
      - --allow-unauthenticated
      - --set-env-vars
      - FLASK_ENV=production,GEMINI_MODEL=gemini-2.5-flash
options:
  logging: CLOUD_LOGGING_ONLY
