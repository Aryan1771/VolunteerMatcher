{% extends "base.html" %}

{% block title %}Admin Login | Smart Volunteer Matching System{% endblock %}

{% block content %}
  <section class="mx-auto max-w-md rounded-lg border border-slate-200 bg-white p-6">
    <h1 class="text-2xl font-semibold">Admin Login</h1>

    <form id="loginForm" class="mt-6 space-y-5">
      <div>
        <label class="form-label" for="username">Username</label>
        <input id="username" name="username" class="form-input" type="text" autocomplete="username" required>
      </div>

      <div>
        <label class="form-label" for="password">Password</label>
        <input id="password" name="password" class="form-input" type="password" autocomplete="current-password" required>
      </div>

      <div id="loginMessage" class="hidden rounded-md px-4 py-3 text-sm"></div>

      <button class="primary-button w-full" type="submit">Login</button>
    </form>
  </section>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/forms.js') }}"></script>
{% endblock %}
