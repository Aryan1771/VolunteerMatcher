{% extends "base.html" %}

{% block title %}Report Problem | Smart Volunteer Matching System{% endblock %}

{% block content %}
  <section class="mx-auto max-w-2xl rounded-lg border border-slate-200 bg-white p-6">
    <h1 class="text-2xl font-semibold">Report a Problem</h1>

    <form id="problemForm" class="mt-6 space-y-5">
      <div>
        <label class="form-label" for="problemLocation">Location</label>
        <input id="problemLocation" name="location" class="form-input" type="text" placeholder="Mumbai" required>
      </div>

      <div>
        <label class="form-label" for="problemType">Problem Type</label>
        <select id="problemType" name="problemType" class="form-input" required>
          <option value="">Select type</option>
          <option value="water">Water</option>
          <option value="health">Health</option>
          <option value="education">Education</option>
        </select>
      </div>

      <div>
        <label class="form-label" for="severity">Severity</label>
        <select id="severity" name="severity" class="form-input" required>
          <option value="">Select severity</option>
          <option value="1">1 - Low</option>
          <option value="2">2</option>
          <option value="3">3 - Medium</option>
          <option value="4">4</option>
          <option value="5">5 - Critical</option>
        </select>
      </div>

      <div>
        <label class="form-label" for="description">Description</label>
        <textarea id="description" name="description" class="form-input min-h-32" placeholder="Describe what is happening..." required></textarea>
      </div>

      <div>
        <label class="form-label" for="problemAvailability">Your Availability</label>
        <select id="problemAvailability" name="availability" class="form-input" required>
          <option value="">Select availability</option>
          <option value="weekdays">Weekdays</option>
          <option value="weekends">Weekends</option>
          <option value="anytime">Anytime</option>
        </select>
      </div>

      <div>
        <label class="form-label" for="workDate">Date Work Should Be Done</label>
        <input id="workDate" name="workDate" class="form-input" type="date" required>
      </div>

      <div id="problemMessage" class="hidden rounded-md px-4 py-3 text-sm"></div>

      <button class="primary-button w-full" type="submit">Submit Problem</button>
    </form>
  </section>
{% endblock %}

{% block scripts %}
  <script src="{{ url_for('static', filename='js/forms.js') }}"></script>
{% endblock %}
